services:
  prod-backend:
    image: ver/v-menu-backend:${PROD_TAG:-1.0.0}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: v-menu-backend
    ports:
      - "8096:8096"
    environment:
      MENU_CONFIG_FILE: config.prod
      MENU_PORT: 8096
    networks:
      - shared-network
    volumes:
      - ./config.prod.yaml:/app/config.prod.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8096/healthz || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 5s

  dev-backend:
    image: ver/v-menu-backend:${DEV_TAG:-dev}
    container_name: v-menu-backend-dev
    restart: unless-stopped
    ports:
      - "8196:8196"
    environment:
      MENU_CONFIG_FILE: config.dev
      MENU_PORT: 8196
    networks:
      - shared-network
    volumes:
      - ./config.dev.yaml:/app/config.dev.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8196/healthz || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  shared-network:
    external: true
